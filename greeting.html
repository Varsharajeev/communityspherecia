<!DOCTYPE html>
<html>
<head>
    <title>Movie Ticket Booking System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: lightblue;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        input, select {
            width: 90%;
            padding: 8px;
            margin: 8px;
        }

        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
            background-color: white;
        }

        table, th, td {
            border: 1px solid black;
        }

        th {
            background-color: lightgreen;
        }

        th, td {
            padding: 10px;
        }

        .error {
            color: red;
            font-size: 14px;
        }
    </style>

    <script>
        function bookTicket() {

            let name = document.getElementById("name").value.trim();
            let phone = document.getElementById("phone").value.trim();
            let movie = document.getElementById("movie").value;
            let tickets = document.getElementById("tickets").value;

            document.getElementById("error").innerHTML = "";

            // Name Validation
            if(name === "") {
                document.getElementById("error").innerHTML =
                "Name cannot be empty";
                return;
            }

            // Phone Validation
            if(!/^[0-9]{10}$/.test(phone)) {
                document.getElementById("error").innerHTML =
                "Phone number must contain exactly 10 digits";
                return;
            }

            // Movie Validation
            if(movie === "") {
                document.getElementById("error").innerHTML =
                "Please select a movie";
                return;
            }

            // Ticket Validation
            if(tickets === "" || tickets <= 0) {
                document.getElementById("error").innerHTML =
                "Enter a valid number of tickets";
                return;
            }

            let table =
            document.getElementById("bookingTable");

            let row = table.insertRow(-1);

            row.insertCell(0).innerHTML = name;
            row.insertCell(1).innerHTML = phone;
            row.insertCell(2).innerHTML = movie;
            row.insertCell(3).innerHTML = tickets;

            document.getElementById("name").value = "";
            document.getElementById("phone").value = "";
            document.getElementById("movie").value = "";
            document.getElementById("tickets").value = "";
        }
    </script>

</head>

<body>

    <div class="container">

        <h2>Movie Ticket Booking System</h2>

        <input type="text"
               id="name"
               placeholder="Enter Name">

        <input type="text"
               id="phone"
               placeholder="Enter Phone Number">

        <select id="movie">
            <option value="">Select Movie</option>
            <option>Avengers</option>
            <option>Pushpa 2</option>
            <option>KGF</option>
            <option>Leo</option>
        </select>

        <input type="number"
               id="tickets"
               placeholder="Number of Tickets">

        <br>

        <button onclick="bookTicket()">
            Book Ticket
        </button>

        <p id="error" class="error"></p>

    </div>

    <table id="bookingTable">

        <tr>
            <th>Name</th>
            <th>Phone Number</th>
            <th>Movie</th>
            <th>Tickets</th>
        </tr>

    </table>

</body>
</html>
